<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVD Player</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📀</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 3rem;
            border: 2px solid #00ff00;
            border-radius: 10px;
            box-shadow:
                    0 0 20px rgba(0, 255, 0, 0.3),
                    0 0 40px rgba(0, 255, 0, 0.2),
                    0 0 60px rgba(0, 255, 0, 0.1),
                    inset 0 0 20px rgba(0, 255, 0, 0.05);
            background: rgba(0, 20, 0, 0.5);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% {
                box-shadow:
                        0 0 20px rgba(0, 255, 0, 0.3),
                        0 0 40px rgba(0, 255, 0, 0.2),
                        0 0 60px rgba(0, 255, 0, 0.1),
                        inset 0 0 20px rgba(0, 255, 0, 0.05);
            }
            50% {
                box-shadow:
                        0 0 30px rgba(0, 255, 0, 0.5),
                        0 0 60px rgba(0, 255, 0, 0.3),
                        0 0 90px rgba(0, 255, 0, 0.2),
                        inset 0 0 30px rgba(0, 255, 0, 0.1);
            }
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00;
        }
        h1 {
            color: #00ff00;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px #00ff00;
        }
        .status {
            color: #00cc00;
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }
        .blinking {
            animation: blink 1.5s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .launch-btn {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: transparent;
            border: 2px solid #00ff00;
            border-radius: 5px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        .launch-btn:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            text-shadow: 0 0 10px #00ff00;
        }
        .launch-btn:active {
            transform: scale(0.98);
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.1) 0px,
                    rgba(0, 0, 0, 0.1) 1px,
                    transparent 1px,
                    transparent 2px
            );
        }
.open-disc-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    padding: 0.6rem 1.2rem;
    background: transparent;
    border: 2px solid #00ff00;
    border-radius: 5px;
    color: #00ff00;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    text-shadow: 0 0 5px #00ff00;
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
    z-index: 100;
}
.open-disc-btn:hover {
    background: rgba(0, 255, 0, 0.1);
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
    text-shadow: 0 0 10px #00ff00;
}
.open-disc-btn:active {
    transform: scale(0.98);
}
#disc-input {
    display: none;
}
</style>
</head>
<body>
<div class="scanline"></div>
<button class="open-disc-btn" onclick="openDiscPicker()">📀 Open Disc/ISO</button>
<input type="file" id="disc-input" accept=".iso,.img,.bin,.cue" onchange="handleDiscSelected(event)">
<div class="container">
    <div class="icon">💿</div>
    <h1>DVD Player</h1>
    <p class="status">// SYSTEM INITIALIZING <span class="blinking">_</span></p>
    <p class="status" style="margin-top: 0.5rem;">Coming Soon</p>
    <button class="launch-btn" onclick="launchPlayer()">Launch Player</button>
</div>
<script>
    function launchPlayer() {
        document.body.innerHTML = '<iframe src="player.html" allow="autoplay" width="640" height="480" style="border: none;"></iframe>';
        document.body.style.display = 'flex';
        document.body.style.justifyContent = 'center';
        document.body.style.alignItems = 'center';
    }

    async function openDiscPicker() {
        try {
            // Try directory picker first (works for disc drives)
            if ('showDirectoryPicker' in window) {
                const dirHandle = await window.showDirectoryPicker({
                    mode: 'read'
                });
                console.log('Selected directory:', dirHandle.name);
                await processDiscDirectory(dirHandle);
            } else {
                // Fallback to file picker for browsers without directory picker support
                document.getElementById('disc-input').click();
            }
        } catch (err) {
            if (err.name !== 'AbortError') {
                console.error('Error selecting disc:', err);
                alert('Error: ' + err.message);
            }
        }
    }

    async function processDiscDirectory(dirHandle) {
        // Look for VIDEO_TS folder (DVD-Video structure)
        try {
            const videoTsHandle = await dirHandle.getDirectoryHandle('VIDEO_TS', { create: false });
            console.log('Found VIDEO_TS folder - this is a DVD-Video disc!');
        
            // Collect all VOB files and hash them
            const vobFiles = [];
            for await (const entry of videoTsHandle.values()) {
                if (entry.name.endsWith('.VOB') || entry.name.endsWith('.IFO') || entry.name.endsWith('.BUP')) {
                    vobFiles.push(entry);
                }
            }
            
            // Launch player and wait for WASM to be ready
            launchPlayer();
            
            // Wait a bit for WASM to initialize
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Hash each file using the Go WASM function
            const iframe = document.querySelector('iframe');
            const wasmWindow = iframe.contentWindow;
            
            for (const fileEntry of vobFiles) {
                const file = await fileEntry.getFile();
                // Note: In WASM context, we need to pass the file path or handle
                // The hashMediaDisc function expects a path string
                const filePath = `${dirHandle.name}/VIDEO_TS/${fileEntry.name}`;
                
                try {
                    if (wasmWindow.hashMediaDisc) {
                        const hash = await wasmWindow.hashMediaDisc(filePath);
                        console.log(`Hash for ${fileEntry.name}: ${hash}`);
                    } else {
                        console.error('hashMediaDisc not available - WASM may not be loaded yet');
                    }
                } catch (err) {
                    console.error(`Error hashing ${fileEntry.name}:`, err);
                }
            }
        } catch {
            // No VIDEO_TS, might be a data disc or ISO contents
            alert('Selected: ' + dirHandle.name + '\n(No VIDEO_TS folder found - not a standard DVD-Video disc)');
        }
    }

    function handleDiscSelected(event) {
        const file = event.target.files[0];
        if (file) {
            console.log('Selected disc/ISO:', file.name);
            alert('Selected: ' + file.name + '\nSize: ' + (file.size / 1024 / 1024).toFixed(2) + ' MB');
        }
    }
</script>
</body>
</html>
